# ============================================================
# Schema → SQL Query Generation (Qwen2.5-Coder) — Configuration
# ============================================================

model:
  name: "Qwen/Qwen2.5-Coder-1.5B"
  max_input_length: 768
  max_output_length: 256

data:
  train_spider: "train_spider.json"
  train_others: "train_others.json"
  dev: "dev.json"
  tables: "tables.json"
  test_tables: "test_tables_unseen.json"
  database_dir: "database"
  test_database_dir: "test_database"
  processed_dir: "processed_data"
  schema_format: "ddl"
  augment_ratio: 0.4                   # 40% of pairs get name-masked copies

training:
  output_dir: "qwen_sql_model"
  epochs: 3
  batch_size: 1
  gradient_accumulation_steps: 8       # Effective batch size = 8
  learning_rate: 1.0e-4
  warmup_ratio: 0.03
  lr_scheduler_type: "cosine"
  lora_rank: 16
  lora_alpha: 32
  lora_dropout: 0.05
  gradient_checkpointing: true
  max_grad_norm: 1.0
  seed: 42

generation:
  num_return_sequences: 10
  temperature: 0.8
  top_p: 0.95
  do_sample: true
